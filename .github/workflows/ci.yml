name: Flutter CI Pipeline

on:
  push:
    branches:
      - main

env:
  FLUTTER_VERSION: "3.38.7"

jobs:
  build:
    name: flutter-build-apk-web
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Java (necesario para Android)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # 3. Cache Flutter + Pub
      - name: Cache Flutter
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ${{ runner.tool_cache }}/flutter
          key: ${{ runner.os }}-flutter-${{ env.FLUTTER_VERSION }}

      # 4. Instalar Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      # 5. Verificar instalación
      - name: Flutter doctor
        run: flutter doctor

      # 6. Instalar dependencias
      - name: Install dependencies
        run: flutter pub get

      # 7. Análisis estático
      - name: Analyze project
        run: flutter analyze

      # 8. Tests (opcional pero pro)
      - name: Run tests
        run: flutter test

      # 9. Build APK
      - name: Build APK (release)
        run: flutter build apk --release

      # 10. Build Web
      - name: Build Web
        run: flutter build web

      # 11. Subir APK como artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      # 12. Subir Web como artifact
      - name: Upload Web
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web